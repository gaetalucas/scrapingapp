<!-- Modal: Editar Precio Rápido -->
<script>
function openEditPriceModal(productId, pvpFull, pvpPromo) {
    document.getElementById('modal-container').innerHTML = `
    <div class="modal-backdrop fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-sm fade-in" onclick="event.stopPropagation()">
            <div class="px-6 py-4 border-b border-gray-200 flex items-center justify-between">
                <h3 class="text-lg font-semibold text-gray-900">Editar Precio</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <form class="p-6 space-y-4" onsubmit="submitEditPrice(event, '${productId}')">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">PVP Full (centavos) *</label>
                    <input type="number" name="pvp_full" required min="1" value="${pvpFull}" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">PVP Promo (centavos)</label>
                    <input type="number" name="pvp_promo" min="0" value="${pvpPromo || ''}" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
                </div>
                <div id="edit-price-errors" class="hidden text-sm text-red-600 bg-red-50 p-3 rounded-lg"></div>
                <div class="flex justify-end gap-3 pt-2">
                    <button type="button" onclick="closeModal()" class="px-4 py-2 text-sm font-medium text-gray-700 border border-gray-300 rounded-lg hover:bg-gray-50">Cancelar</button>
                    <button type="submit" class="px-4 py-2 text-sm font-medium text-white bg-primary-800 rounded-lg hover:bg-primary-700">Guardar</button>
                </div>
            </form>
        </div>
    </div>`;
}

async function submitEditPrice(e, productId) {
    e.preventDefault();
    const form = e.target;
    const data = {
        pvp_full: parseInt(form.pvp_full.value),
        pvp_promo: form.pvp_promo.value ? parseInt(form.pvp_promo.value) : null,
    };

    const res = await fetch(`/api/v1/products/${productId}/`, {
        method: 'PATCH',
        headers: getAuthHeaders(),
        body: JSON.stringify(data),
    });

    if (res.ok) {
        closeModal();
        showToast('Precio actualizado');
        loadProducts(currentPage);
    } else {
        const err = await res.json();
        const errDiv = document.getElementById('edit-price-errors');
        errDiv.classList.remove('hidden');
        errDiv.textContent = JSON.stringify(err);
    }
}
</script>
