<!-- Modal: Nuevo Producto -->
<script>
async function openNewProductModal() {
    const [brandsRes, catsRes] = await Promise.all([
        fetch('/api/v1/brands/', { headers: getAuthHeaders() }),
        fetch('/api/v1/categories/', { headers: getAuthHeaders() })
    ]);
    const brandsData = await brandsRes.json();
    const catsData = await catsRes.json();
    const brands = brandsData.results || brandsData.data || brandsData || [];
    const categories = catsData.results || catsData.data || catsData || [];

    document.getElementById('modal-container').innerHTML = `
    <div class="modal-backdrop fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg fade-in" onclick="event.stopPropagation()">
            <div class="px-6 py-4 border-b border-gray-200 flex items-center justify-between">
                <h3 class="text-lg font-semibold text-gray-900">Nuevo Producto</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <form id="new-product-form" class="p-6 space-y-4" onsubmit="submitNewProduct(event)">
                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-2">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Nombre *</label>
                        <input type="text" name="name" required class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500" placeholder="Galaxy S24 128GB">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Marca *</label>
                        <select name="brand" required class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
                            <option value="">Seleccionar...</option>
                            ${brands.map(b => `<option value="${b.id}">${b.name}</option>`).join('')}
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Categoría *</label>
                        <select name="category" required class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
                            <option value="">Seleccionar...</option>
                            ${categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('')}
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Modelo *</label>
                        <input type="text" name="model" required class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500" placeholder="S24">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">SKU *</label>
                        <input type="text" name="sku" required class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500" placeholder="SM-S24-128">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">PVP Full (centavos) *</label>
                        <input type="number" name="pvp_full" required min="1" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500" placeholder="1199000">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">PVP Promo (centavos)</label>
                        <input type="number" name="pvp_promo" min="0" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500" placeholder="999000">
                    </div>
                </div>
                <div id="new-product-errors" class="hidden text-sm text-red-600 bg-red-50 p-3 rounded-lg"></div>
                <div class="flex justify-end gap-3 pt-2">
                    <button type="button" onclick="closeModal()" class="px-4 py-2 text-sm font-medium text-gray-700 border border-gray-300 rounded-lg hover:bg-gray-50">Cancelar</button>
                    <button type="submit" class="px-4 py-2 text-sm font-medium text-white bg-primary-800 rounded-lg hover:bg-primary-700">Guardar</button>
                </div>
            </form>
        </div>
    </div>`;
}

async function submitNewProduct(e) {
    e.preventDefault();
    const form = e.target;
    const data = {
        name: form.name.value,
        brand: form.brand.value,
        category: form.category.value,
        model: form.model.value,
        sku: form.sku.value,
        pvp_full: parseInt(form.pvp_full.value),
        pvp_promo: form.pvp_promo.value ? parseInt(form.pvp_promo.value) : null,
    };

    const res = await fetch('/api/v1/products/', {
        method: 'POST',
        headers: getAuthHeaders(),
        body: JSON.stringify(data),
    });

    if (res.ok) {
        closeModal();
        showToast('Producto creado exitosamente');
        loadProducts(1);
    } else {
        const err = await res.json();
        const errDiv = document.getElementById('new-product-errors');
        errDiv.classList.remove('hidden');
        const messages = Object.entries(err).map(([k, v]) => `${k}: ${Array.isArray(v) ? v.join(', ') : v}`).join('<br>');
        errDiv.innerHTML = messages;
    }
}
</script>
